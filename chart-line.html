<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monthly Growth Line Chart</title>
<style>
  body {
    margin: 0;
    width: 1920px;
    height: 1080px;
    background-color: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 32px;
    font-family: sans-serif;
  }
  h1 {
    color: #e6edf3;
    font-size: 36px;
    margin: 0;
  }
  .chart-container {
    display: flex;
    gap: 60px;
    align-items: center;
  }
  .legend {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #8b949e;
    font-size: 14px;
  }
  .legend-line {
    width: 24px;
    height: 3px;
    border-radius: 2px;
  }
</style>
</head>
<body>
<h1>User Growth &amp; Sessions</h1>
<div class="chart-container">
  <!-- SVG line chart rendering -->
  <svg width="700" height="420" viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
    <!-- Y-axis -->
    <line x1="60" y1="20" x2="60" y2="360" stroke="#30363d" stroke-width="1"/>
    <!-- X-axis -->
    <line x1="60" y1="360" x2="680" y2="360" stroke="#30363d" stroke-width="1"/>

    <!-- Grid lines -->
    <line x1="60" y1="105" x2="680" y2="105" stroke="#21262d" stroke-width="1" stroke-dasharray="4"/>
    <line x1="60" y1="190" x2="680" y2="190" stroke="#21262d" stroke-width="1" stroke-dasharray="4"/>
    <line x1="60" y1="275" x2="680" y2="275" stroke="#21262d" stroke-width="1" stroke-dasharray="4"/>

    <!-- Y-axis labels -->
    <text x="50" y="365" text-anchor="end" fill="#8b949e" font-size="11">0</text>
    <text x="50" y="278" text-anchor="end" fill="#8b949e" font-size="11">10k</text>
    <text x="50" y="193" text-anchor="end" fill="#8b949e" font-size="11">20k</text>
    <text x="50" y="108" text-anchor="end" fill="#8b949e" font-size="11">30k</text>
    <text x="50" y="25" text-anchor="end" fill="#8b949e" font-size="11">40k</text>

    <!-- X-axis labels (Jan-Jun) -->
    <text x="100" y="385" text-anchor="middle" fill="#8b949e" font-size="12">Jan</text>
    <text x="220" y="385" text-anchor="middle" fill="#8b949e" font-size="12">Feb</text>
    <text x="340" y="385" text-anchor="middle" fill="#8b949e" font-size="12">Mar</text>
    <text x="460" y="385" text-anchor="middle" fill="#8b949e" font-size="12">Apr</text>
    <text x="580" y="385" text-anchor="middle" fill="#8b949e" font-size="12">May</text>
    <text x="660" y="385" text-anchor="middle" fill="#8b949e" font-size="12">Jun</text>

    <!-- Line 1: Users (12k, 14.5k, 15k, 25k, 22k, 30k) -->
    <polyline
      points="100,258 220,237 340,232 460,147 580,173 660,105"
      fill="none" stroke="#4ecdc4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Data points -->
    <circle cx="100" cy="258" r="5" fill="#4ecdc4"/>
    <circle cx="220" cy="237" r="5" fill="#4ecdc4"/>
    <circle cx="340" cy="232" r="5" fill="#4ecdc4"/>
    <circle cx="460" cy="147" r="5" fill="#4ecdc4"/>
    <circle cx="580" cy="173" r="5" fill="#4ecdc4"/>
    <circle cx="660" cy="105" r="5" fill="#4ecdc4"/>

    <!-- Line 2: Sessions (34k, 38k, 33k, 42k, 39k, 45k) scaled differently -->
    <polyline
      points="100,72 220,37 340,80 460,3 580,29 660,-22"
      fill="none" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Data points -->
    <circle cx="100" cy="72" r="5" fill="#ff6b6b"/>
    <circle cx="220" cy="37" r="5" fill="#ff6b6b"/>
    <circle cx="340" cy="80" r="5" fill="#ff6b6b"/>
    <circle cx="460" cy="3" r="5" fill="#ff6b6b"/>
    <circle cx="580" cy="29" r="5" fill="#ff6b6b"/>
    <circle cx="660" cy="-22" r="5" fill="#ff6b6b"/>
  </svg>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-line" style="background: #4ecdc4;"></div>
      Users
    </div>
    <div class="legend-item">
      <div class="legend-line" style="background: #ff6b6b;"></div>
      Sessions
    </div>
  </div>
</div>

<!-- Chart.js style data in script for agent extraction -->
<canvas id="lineChart" width="700" height="420" style="display:none;"></canvas>
<script>
  const chartConfig = {
    type: 'line',
    data: {
      labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
      datasets: [
        {
          label: 'Users',
          data: [12000, 14500, 15000, 25000, 22000, 30000],
          borderColor: '#4ecdc4',
          tension: 0.3
        },
        {
          label: 'Sessions',
          data: [34000, 38000, 33000, 42000, 39000, 45000],
          borderColor: '#ff6b6b',
          tension: 0.3
        }
      ]
    },
    options: {
      responsive: false,
      scales: {
        y: { beginAtZero: true }
      }
    }
  };
</script>
</body>
</html>
