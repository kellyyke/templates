<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fruit SVGs Test</title>
</head>
<body style="margin:0; width:1920px; height:1080px; background-color:#1a0533; display:flex; align-items:center; justify-content:center; gap:80px; padding:60px; box-sizing:border-box;">

<!-- Apple - large, left -->
<svg width="420" height="480" viewBox="0 0 420 480" xmlns="http://www.w3.org/2000/svg">
  <!-- Stem -->
  <path d="M210 60 Q205 30 215 10 Q225 5 220 25 Q218 45 212 58 Z" fill="#5d4037"/>
  <!-- Leaf -->
  <path d="M215 35 Q240 15 265 25 Q255 45 230 45 Q220 42 215 35 Z" fill="#66bb6a"/>
  <path d="M215 35 Q240 30 250 32" fill="none" stroke="#388e3c" stroke-width="1.5"/>
  <!-- Body -->
  <path d="M210 80 C140 80 60 140 60 260 C60 380 130 440 210 440 C290 440 360 380 360 260 C360 140 280 80 210 80 Z" fill="#e53935"/>
  <!-- Top indent -->
  <path d="M210 80 C195 85 185 95 190 105 C200 95 210 90 220 95 C230 100 235 85 210 80 Z" fill="#c62828"/>
  <!-- Highlight -->
  <ellipse cx="160" cy="200" rx="40" ry="55" fill="#ef5350" opacity="0.6"/>
  <!-- Shadow -->
  <ellipse cx="260" cy="320" rx="50" ry="60" fill="#b71c1c" opacity="0.3"/>
</svg>

<!-- Banana - medium, center -->
<svg width="350" height="500" viewBox="0 0 350 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Stem -->
  <path d="M170 50 Q165 30 175 15 Q185 10 180 30 L175 48 Z" fill="#795548"/>
  <!-- Main body -->
  <path d="M175 50 C120 80 70 150 55 250 C40 350 80 420 140 460 C160 475 180 470 185 455 C190 440 170 420 155 400 C120 360 100 300 115 220 C130 140 170 100 220 80 C240 72 245 60 235 55 C225 50 200 48 175 50 Z" fill="#fdd835"/>
  <!-- Inner curve highlight -->
  <path d="M175 70 C130 100 90 160 80 250 C70 330 95 390 140 430 C150 438 155 435 150 425 C110 380 95 310 105 230 C115 150 155 100 200 75 C210 70 200 65 175 70 Z" fill="#ffee58" opacity="0.7"/>
  <!-- Brown tip -->
  <path d="M140 460 C155 470 165 465 160 455 C155 448 145 455 140 460 Z" fill="#4e342e"/>
  <!-- Spots -->
  <circle cx="130" cy="250" r="5" fill="#a1887f" opacity="0.5"/>
  <circle cx="110" cy="320" r="4" fill="#a1887f" opacity="0.4"/>
  <circle cx="145" cy="180" r="3" fill="#a1887f" opacity="0.3"/>
</svg>

<!-- Monkey - large, right -->
<svg width="500" height="580" viewBox="0 0 500 580" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <ellipse cx="250" cy="420" rx="120" ry="140" fill="#6d4c41"/>
  <!-- Belly -->
  <ellipse cx="250" cy="440" rx="75" ry="90" fill="#a1887f"/>
  <!-- Left arm -->
  <path d="M140 380 Q100 350 80 310 Q75 295 85 300 Q110 330 150 360 Z" fill="#5d4037"/>
  <!-- Right arm -->
  <path d="M360 380 Q400 350 420 310 Q425 295 415 300 Q390 330 350 360 Z" fill="#5d4037"/>
  <!-- Left leg -->
  <ellipse cx="190" cy="545" rx="40" ry="25" fill="#5d4037"/>
  <!-- Right leg -->
  <ellipse cx="310" cy="545" rx="40" ry="25" fill="#5d4037"/>
  <!-- Head -->
  <circle cx="250" cy="200" r="110" fill="#6d4c41"/>
  <!-- Face -->
  <ellipse cx="250" cy="230" rx="70" ry="60" fill="#d7ccc8"/>
  <!-- Left ear -->
  <circle cx="135" cy="180" r="40" fill="#6d4c41"/>
  <circle cx="135" cy="180" r="25" fill="#d7ccc8"/>
  <!-- Right ear -->
  <circle cx="365" cy="180" r="40" fill="#6d4c41"/>
  <circle cx="365" cy="180" r="25" fill="#d7ccc8"/>
  <!-- Eyes -->
  <ellipse cx="220" cy="190" rx="18" ry="22" fill="white"/>
  <ellipse cx="280" cy="190" rx="18" ry="22" fill="white"/>
  <circle cx="223" cy="195" r="10" fill="#212121"/>
  <circle cx="277" cy="195" r="10" fill="#212121"/>
  <!-- Eye shine -->
  <circle cx="227" cy="190" r="4" fill="white"/>
  <circle cx="281" cy="190" r="4" fill="white"/>
  <!-- Nose -->
  <ellipse cx="250" cy="235" rx="12" ry="8" fill="#4e342e"/>
  <!-- Mouth -->
  <path d="M230 260 Q250 280 270 260" fill="none" stroke="#4e342e" stroke-width="3" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M235 265 Q250 275 265 265" fill="none" stroke="#5d4037" stroke-width="2" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M130 450 Q60 430 40 370 Q30 340 50 350 Q70 360 80 390 Q90 420 130 430" fill="none" stroke="#5d4037" stroke-width="12" stroke-linecap="round"/>
</svg>

</body>
</html>
