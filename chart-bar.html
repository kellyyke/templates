<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quarterly Revenue Bar Chart</title>
<style>
  body {
    margin: 0;
    width: 1920px;
    height: 1080px;
    background-color: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    font-family: sans-serif;
  }
  h1 {
    color: #e6edf3;
    font-size: 36px;
    margin: 0 0 20px 0;
  }
  .legend {
    display: flex;
    gap: 24px;
    margin-top: 16px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #8b949e;
    font-size: 14px;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 3px;
  }
</style>
</head>
<body>
<h1>Quarterly Revenue vs Costs</h1>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Y-axis -->
  <line x1="80" y1="40" x2="80" y2="420" stroke="#30363d" stroke-width="1"/>
  <!-- X-axis -->
  <line x1="80" y1="420" x2="760" y2="420" stroke="#30363d" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="70" y="420" text-anchor="end" fill="#8b949e" font-size="12">0</text>
  <text x="70" y="325" text-anchor="end" fill="#8b949e" font-size="12">100k</text>
  <text x="70" y="230" text-anchor="end" fill="#8b949e" font-size="12">200k</text>
  <text x="70" y="135" text-anchor="end" fill="#8b949e" font-size="12">300k</text>
  <text x="70" y="45" text-anchor="end" fill="#8b949e" font-size="12">400k</text>

  <!-- Grid lines -->
  <line x1="80" y1="325" x2="760" y2="325" stroke="#21262d" stroke-width="1" stroke-dasharray="4"/>
  <line x1="80" y1="230" x2="760" y2="230" stroke="#21262d" stroke-width="1" stroke-dasharray="4"/>
  <line x1="80" y1="135" x2="760" y2="135" stroke="#21262d" stroke-width="1" stroke-dasharray="4"/>

  <!-- Q1: Revenue=150k, Costs=80k -->
  <rect x="120" y="278" width="60" height="142" fill="#4ecdc4" rx="4"/>
  <rect x="185" y="344" width="60" height="76" fill="#ff6b6b" rx="4"/>

  <!-- Q2: Revenue=220k, Costs=95k -->
  <rect x="290" y="211" width="60" height="209" fill="#4ecdc4" rx="4"/>
  <rect x="355" y="330" width="60" height="90" fill="#ff6b6b" rx="4"/>

  <!-- Q3: Revenue=310k, Costs=120k -->
  <rect x="460" y="125" width="60" height="295" fill="#4ecdc4" rx="4"/>
  <rect x="525" y="306" width="60" height="114" fill="#ff6b6b" rx="4"/>

  <!-- Q4: Revenue=280k, Costs=110k -->
  <rect x="630" y="154" width="60" height="266" fill="#4ecdc4" rx="4"/>
  <rect x="695" y="316" width="60" height="104" fill="#ff6b6b" rx="4"/>

  <!-- X-axis labels -->
  <text x="182" y="450" text-anchor="middle" fill="#8b949e" font-size="14">Q1</text>
  <text x="352" y="450" text-anchor="middle" fill="#8b949e" font-size="14">Q2</text>
  <text x="522" y="450" text-anchor="middle" fill="#8b949e" font-size="14">Q3</text>
  <text x="692" y="450" text-anchor="middle" fill="#8b949e" font-size="14">Q4</text>
</svg>
<div class="legend">
  <div class="legend-item">
    <div class="legend-swatch" style="background: #4ecdc4;"></div>
    Revenue
  </div>
  <div class="legend-item">
    <div class="legend-swatch" style="background: #ff6b6b;"></div>
    Costs
  </div>
</div>
</body>
</html>
