<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Tables for Chart Extraction</title>
<style>
  body {
    margin: 0;
    width: 1920px;
    height: 1080px;
    background-color: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 48px;
    font-family: sans-serif;
  }
  h2 {
    color: #e6edf3;
    font-size: 28px;
    margin: 0;
  }
  table {
    border-collapse: collapse;
    font-size: 15px;
  }
  th, td {
    padding: 12px 24px;
    text-align: right;
    border: 1px solid #30363d;
    color: #c9d1d9;
  }
  th {
    background-color: #161b22;
    color: #8b949e;
    font-weight: 600;
    text-align: center;
  }
  td:first-child {
    text-align: left;
    font-weight: 500;
  }
  tr:nth-child(even) td {
    background-color: #0d1117;
  }
  tr:nth-child(odd) td {
    background-color: #161b22;
  }
</style>
</head>
<body>

<!-- Table 1: Revenue by category over years (stacked column / stacked area) -->
<h2>Annual Revenue by Product (in thousands)</h2>
<table>
  <thead>
    <tr>
      <th>Product</th>
      <th>2021</th>
      <th>2022</th>
      <th>2023</th>
      <th>2024</th>
    </tr>
  </thead>
  <tbody>
    <tr><td>Design Suite</td><td>120</td><td>185</td><td>240</td><td>310</td></tr>
    <tr><td>Video Editor</td><td>45</td><td>78</td><td>130</td><td>195</td></tr>
    <tr><td>Presentations</td><td>60</td><td>92</td><td>115</td><td>148</td></tr>
    <tr><td>Whiteboards</td><td>15</td><td>35</td><td>68</td><td>105</td></tr>
    <tr><td>Print</td><td>80</td><td>85</td><td>90</td><td>88</td></tr>
  </tbody>
</table>

<!-- Table 2: Market share percentages (pie chart) -->
<h2>Market Share by Region</h2>
<table>
  <thead>
    <tr>
      <th>Region</th>
      <th>Share (%)</th>
    </tr>
  </thead>
  <tbody>
    <tr><td>North America</td><td>38</td></tr>
    <tr><td>Europe</td><td>27</td></tr>
    <tr><td>Asia Pacific</td><td>22</td></tr>
    <tr><td>Latin America</td><td>8</td></tr>
    <tr><td>Rest of World</td><td>5</td></tr>
  </tbody>
</table>

</body>
</html>
