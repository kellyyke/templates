<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pie and Donut Charts</title>
<style>
  body {
    margin: 0;
    width: 1920px;
    height: 1080px;
    background-color: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 120px;
    font-family: sans-serif;
  }
  .chart-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  h2 {
    color: #e6edf3;
    font-size: 28px;
    margin: 0;
  }
  .legend {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #8b949e;
    font-size: 13px;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
  }
</style>
</head>
<body>

<!-- Pie Chart: Browser Market Share -->
<div class="chart-section">
  <h2>Browser Market Share</h2>
  <svg width="320" height="320" viewBox="-1 -1 2 2" xmlns="http://www.w3.org/2000/svg" style="transform: rotate(-90deg);">
    <!-- Chrome: 65% (0 to 0.65 = 0° to 234°) -->
    <path d="M 1 0 A 1 1 0 1 1 -0.5878 -0.809 L 0 0 Z" fill="#4ecdc4"/>
    <!-- Firefox: 15% (234° to 288°) -->
    <path d="M -0.5878 -0.809 A 1 1 0 0 1 -0.309 0.9511 L 0 0 Z" fill="#ff6b6b"/>
    <!-- Safari: 12% (288° to 331.2°) -->
    <path d="M -0.309 0.9511 A 1 1 0 0 1 0.4818 0.8763 L 0 0 Z" fill="#feca57"/>
    <!-- Other: 8% (331.2° to 360°) -->
    <path d="M 0.4818 0.8763 A 1 1 0 0 1 1 0 L 0 0 Z" fill="#a29bfe"/>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#4ecdc4;"></div>Chrome — 65%</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ff6b6b;"></div>Firefox — 15%</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#feca57;"></div>Safari — 12%</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#a29bfe;"></div>Other — 8%</div>
  </div>
</div>

<!-- Donut Chart: Revenue by Category -->
<div class="chart-section">
  <h2>Revenue by Category</h2>
  <svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
    <!-- Donut segments using stroke-dasharray on circles (r=100, circumference=628.3) -->
    <!-- SaaS: 40% = 251.3 -->
    <circle cx="160" cy="160" r="100" fill="none" stroke="#6c5ce7" stroke-width="60"
      stroke-dasharray="251.3 376.99" stroke-dashoffset="0" transform="rotate(-90 160 160)"/>
    <!-- Enterprise: 30% = 188.5 -->
    <circle cx="160" cy="160" r="100" fill="none" stroke="#00b894" stroke-width="60"
      stroke-dasharray="188.5 439.8" stroke-dashoffset="-251.3" transform="rotate(-90 160 160)"/>
    <!-- Self-serve: 20% = 125.66 -->
    <circle cx="160" cy="160" r="100" fill="none" stroke="#fdcb6e" stroke-width="60"
      stroke-dasharray="125.66 502.64" stroke-dashoffset="-439.8" transform="rotate(-90 160 160)"/>
    <!-- Other: 10% = 62.83 -->
    <circle cx="160" cy="160" r="100" fill="none" stroke="#e17055" stroke-width="60"
      stroke-dasharray="62.83 565.49" stroke-dashoffset="-565.46" transform="rotate(-90 160 160)"/>
    <!-- Inner white circle for donut hole -->
    <circle cx="160" cy="160" r="70" fill="#1a1a2e"/>
  </svg>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#6c5ce7;"></div>SaaS — 40%</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#00b894;"></div>Enterprise — 30%</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fdcb6e;"></div>Self-serve — 20%</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#e17055;"></div>Other — 10%</div>
  </div>
</div>

</body>
</html>
